chart:
  layout_name: Screener
  chart_timeframe: 45 seconds
  bar_style: candle
  headless: true
screener:
  shorttitle: Screener V2
  name: TTE Screener V2
alerts:
  batch_size: 2
  creation_delay: 1.5
  recalc_wait: 1.5
  start_fresh: false
webhook:
  url: https://stockbuddy.co/api/tte/combo
snapshot:
  enabled: true
  layout_name: Snapshot
  bar_style: candle
  batch_size: 10
  poll_interval: 60
  bars_to_right: 60
  # Reversal is handled by the reversed Trade Drawer V2 Pine indicator
  # (Pine Script Code/Trade Drawer V2.txt). Keep this FALSE so we don't
  # double-flip. Set to true only as emergency rollback when running with
  # the legacy non-reversed Trade Drawer indicator.
  reversed_strategy: false
maintenance:
  interval: 150
progress:
  file: combo_progress.json
