chart:
  layout_name: Screener
  chart_timeframe: 1 minute
  bar_style: candle
  headless: true
screener:
  shorttitle: Screener
  name: TTE Screener
alerts:
  batch_size: 3
  creation_delay: 1.5
  recalc_wait: 1.5
  start_fresh: false
webhook:
  url: https://stock-buddy-app.vercel.app/api/tte/combo
snapshot:
  enabled: true
  layout_name: Snapshot
  bar_style: candle
  batch_size: 5
  poll_interval: 60
  bars_to_right: 60
maintenance:
  interval: 300
progress:
  file: combo_progress.json
