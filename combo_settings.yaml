chart:
  layout_name: Screener
  chart_timeframe: 45 seconds
  bar_style: candle
  headless: true
screener:
  shorttitle: Screener V2
  name: TTE Screener V2
alerts:
  batch_size: 2
  creation_delay: 1.5
  recalc_wait: 1.5
  start_fresh: false
webhook:
  url: https://stockbuddy.co/api/tte/combo
snapshot:
  enabled: true
  layout_name: Snapshot
  bar_style: candle
  batch_size: 10
  poll_interval: 60
  bars_to_right: 60
  # Draw TP at original-SL price and SL at original-TP price (Coda i-BqLTT9VWoP).
  # Webhook payload is unchanged; only the TradingView chart drawing flips.
  # Override at runtime via env: REVERSED_STRATEGY_SNAPSHOTS=true|false.
  reversed_strategy: true
maintenance:
  interval: 150
progress:
  file: combo_progress.json
