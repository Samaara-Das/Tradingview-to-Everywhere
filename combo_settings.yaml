# TTE Combo Mode Settings
# All configurable options for the combo mode orchestrator.
# Change these values to customize behavior without touching Python code.

# TradingView chart settings
chart:
  layout_name: "Screener"            # TradingView layout to switch to
  chart_timeframe: "1 minute"               # Chart timeframe (must match dropdown label exactly: "1 minute", "5 minutes", "15 minutes", "1 hour", "4 hours", "1 day", etc.)
  bar_style: "line"                # Bar style data-value: "candle", "line", "area", "ha" (Heikin Ashi), "hollowCandle", etc.
  headless: false                   # Run Chrome in headless mode (no visible window)

# Screener indicator settings
screener:
  shorttitle: "Screener"             # Short title of the combo screener indicator on the chart
  name: "TTE Screener"               # Full name of the combo screener indicator

# Alert creation settings
alerts:
  batch_size: 3                      # Symbols per alert (reduced from 4 for better 1-min chart performance)
  creation_delay: 1.5                # Seconds to wait between batches
  recalc_wait: 1.5                   # Seconds to wait for screener recalculation (minimum 0.5)
  start_fresh: false                 # Delete all existing alerts before setup (override with --fresh flag)

# Webhook settings
webhook:
  url: "https://stock-buddy-app.vercel.app/api/tte/combo"                            # Set via COMBO_WEBHOOK_URL env var (takes precedence over this)

# Maintenance settings
maintenance:
  interval: 300                      # Seconds between restart-inactive-alerts cycles (minimum 60)

# Progress tracking
progress:
  file: "combo_progress.json"        # File to save/resume alert creation progress
